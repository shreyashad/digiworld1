{% extends "base.html" %}
{% load wagtailcore_tags %}
{% block extra_css %}
<style>
    .policy-content ul {
        list-style: disc;
        padding-left: 1.5rem;
        margin: 1rem 0;
    }

    .policy-content ol {
        list-style: decimal;
        padding-left: 1.5rem;
        margin: 1rem 0;
    }

    .policy-content li {
        margin: 0.5rem 0;
    }

    .policy-content p {
        margin: 1rem 0;
    }
</style>
{% endblock %}
{% block content %}
<div class="min-h-screen bg-white">
    <div class="mx-auto max-w-4xl px-6 py-16 lg:px-8">
        <!-- Page Title -->
        <h1 class="text-4xl font-bold text-black mb-8">{{ page.title }}</h1>
        
        <!-- Page Content -->
        <div class="policy-content max-w-none text-gray-700">
            {{ page.body|richtext }}
        </div>
    </div>
</div>
{% endblock %}
