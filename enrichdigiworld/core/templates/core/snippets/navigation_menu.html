{% if menu %}
{% for item in menu.menu_items.all %}
<a href="{{ item.link }}"
    class="block transition-colors {% if 'footer' in menu.slug %}text-gray-400 text-sm mb-4 hover:text-white{% else %}px-3 py-4 text-lg font-normal opacity-75 text-black hover:opacity-100 whitespace-nowrap{% endif %}">
    {{ item.label }}
</a>
{% endfor %}
{% endif %}
